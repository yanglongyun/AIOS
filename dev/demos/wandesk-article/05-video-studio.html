<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wandesk · 视频工坊</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'Barlow', system-ui, -apple-system, 'PingFang SC', sans-serif; overflow: hidden;
    background: #1c1c1e; display: flex; align-items: center; justify-content: center; }
  .screen { position: relative; width: 1600px; height: 900px; overflow: hidden; flex: none; transform-origin: center;
    background: linear-gradient(to top, #fff1eb 0%, #ace0f9 100%); }
  .desktop-icons { position: absolute; top: 24px; left: 24px; bottom: 24px; z-index: 1; display: grid;
    grid-template-columns: repeat(auto-fill, 80px); grid-template-rows: repeat(auto-fill, 90px); grid-auto-flow: column; gap: 6px 16px; align-content: start; }
  .dicon { width: 80px; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 4px; }
  .dicon .g { font-size: 26px; line-height: 1; transform: translateY(-2px); }
  .dicon .l { font-size: 11px; font-weight: 600; color: #222; text-align: center; line-height: 1.15; max-width: 72px; text-shadow: 0 1px 4px rgba(255,255,255,0.9); }
  .win { position: absolute; overflow: hidden; background: #f7f4ef; border: 1px solid rgba(255,255,255,0.5); border-radius: 14px; box-shadow: 0 22px 70px rgba(0,0,0,0.28); }
  .tbar { height: 40px; display: flex; align-items: center; gap: 8px; padding: 0 12px; border-bottom: 1px solid rgba(0,0,0,0.06); background: rgba(247,244,239,0.92); }
  .tbar .ic { font-size: 15px; } .tbar .tt { flex: 1; font-size: 12.5px; font-weight: 600; color: #2a1f13; }
  .ctl { width: 14px; height: 14px; border-radius: 50%; } .ctl.min{background:#f6c15f;}.ctl.max{background:#67c86f;}.ctl.cls{background:#ef6a5d;}
  .taskbar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 250; height: 44px; display: flex; align-items: center; gap: 8px; padding: 0 8px; border-top: 1px solid rgba(255,255,255,0.6); background: rgba(255,255,255,0.56); backdrop-filter: blur(24px); }
  .launch { width: 32px; height: 32px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.05); color: #222; } .launch svg { width: 17px; height: 17px; }
  .tb-sep { width: 1px; height: 22px; background: rgba(0,0,0,0.07); margin: 0 6px; }
  .tb-win { height: 32px; min-width: 88px; display: flex; align-items: center; gap: 6px; padding: 0 9px; border-radius: 7px; border: 1px solid transparent; font-size: 12px; font-weight: 500; color: #222; }
  .tb-win.active { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.12); } .tb-win .i { font-size: 15px; }
  .clock { margin-left: auto; width: 84px; text-align: right; padding-right: 6px; } .clock .t { font-size: 13px; font-weight: 600; color: #222; } .clock .d { font-size: 10px; color: rgba(0,0,0,0.38); }

  /* ── 视频工坊(剪辑台,深色)── */
  .win-vid { top: 70px; left: 268px; width: 1064px; height: 760px; }
  .vs { height: calc(100% - 40px); background: #141318; color: #e6e2ee; display: flex; flex-direction: column; }
  .vs-main { flex: 1; display: flex; min-height: 0; }
  /* 预览 */
  .vs-stage { flex: 1; display: flex; flex-direction: column; padding: 18px 20px; min-width: 0; }
  .preview { flex: 1; border-radius: 12px; position: relative; overflow: hidden;
    background: radial-gradient(120% 90% at 70% 10%, #3a2c5a 0%, #1a1430 55%, #0c0a18 100%); display: flex; align-items: center; justify-content: center; }
  .preview .scene { text-align: center; }
  .preview .moon { font-size: 60px; filter: drop-shadow(0 0 24px rgba(255,230,160,0.5)); }
  .preview .cap { margin-top: 16px; font-size: 22px; font-weight: 600; color: #f0ead8; letter-spacing: .02em; }
  .preview .sub { margin-top: 8px; font-size: 13px; color: #b9aee0; }
  .preview .play { position: absolute; bottom: 14px; left: 16px; right: 16px; display: flex; align-items: center; gap: 12px; }
  .preview .pbtn { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.92); color: #141318; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .pbar { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); position: relative; }
  .pbar i { position: absolute; left: 0; top: 0; bottom: 0; width: 38%; background: #ffd86b; border-radius: 2px; }
  .ptime { font-size: 12px; color: #cfc8e0; font-variant-numeric: tabular-nums; }
  /* 右侧片段面板 */
  .vs-side { width: 252px; flex: none; border-left: 1px solid rgba(255,255,255,0.08); padding: 16px 14px; display: flex; flex-direction: column; }
  .vs-side .hd { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: #8a82a0; margin-bottom: 10px; }
  .seg { display: flex; gap: 10px; align-items: center; padding: 9px; border-radius: 10px; background: #211d2a; margin-bottom: 8px; }
  .seg .th { width: 46px; height: 30px; border-radius: 5px; flex: none; }
  .seg .t { font-size: 12.5px; color: #d8d2e6; } .seg .d { font-size: 11px; color: #8a82a0; }
  .vs-side .add { margin-top: auto; font-size: 13px; font-weight: 600; color: #cdbcff; border: 1px dashed rgba(124,92,255,0.5); border-radius: 9px; padding: 9px; text-align: center; }
  /* 底部时间线 */
  .timeline { height: 92px; flex: none; border-top: 1px solid rgba(255,255,255,0.08); padding: 12px 20px; display: flex; align-items: center; gap: 8px; background: #100f15; }
  .clip { height: 56px; border-radius: 6px; flex: none; position: relative; overflow: hidden; }
  .clip.img { width: 96px; }
  .clip .wave { position: absolute; bottom: 0; left: 0; right: 0; height: 16px; display: flex; align-items: flex-end; gap: 1.5px; padding: 0 3px; background: rgba(0,0,0,0.35); }
  .clip .wave i { flex: 1; background: #6fe0c0; border-radius: 1px; }
  .tl-actions { margin-left: auto; display: flex; gap: 8px; }
  .pubtn { font-size: 12.5px; font-weight: 700; padding: 9px 15px; border-radius: 9px; display: flex; align-items: center; gap: 6px; }
  .pubtn.dy { background: #000; color: #fff; } .pubtn.bili { background: #fb7299; color: #fff; }
</style>
</head>
<body>
  <div class="screen">
    <div class="desktop-icons">
      <div class="dicon"><div class="g">💬</div><div class="l">聊天</div></div>
      <div class="dicon"><div class="g">⚡</div><div class="l">任务</div></div>
      <div class="dicon"><div class="g">💭</div><div class="l">记忆</div></div>
      <div class="dicon"><div class="g">🗂</div><div class="l">文件</div></div>
      <div class="dicon"><div class="g">📓</div><div class="l">笔记本</div></div>
      <div class="dicon"><div class="g">💰</div><div class="l">记账</div></div>
      <div class="dicon"><div class="g">💡</div><div class="l">开源雷达</div></div>
      <div class="dicon"><div class="g">🪄</div><div class="l">应用工坊</div></div>
      <div class="dicon"><div class="g">📌</div><div class="l">便签板</div></div>
      <div class="dicon"><div class="g">📡</div><div class="l">新品速递</div></div>
      <div class="dicon"><div class="g">🎴</div><div class="l">Demo 工坊</div></div>
      <div class="dicon"><div class="g">🎬</div><div class="l">视频工坊</div></div>
      <div class="dicon"><div class="g">✍️</div><div class="l">写作台</div></div>
    </div>

    <div class="win win-vid">
      <div class="tbar"><span class="ic">🎬</span><span class="tt">视频工坊</span><span class="ctl min"></span><span class="ctl max"></span><span class="ctl cls"></span></div>
      <div class="vs">
        <div class="vs-main">
          <div class="vs-stage">
            <div class="preview">
              <div class="scene"><div class="moon">🌙</div><div class="cap">睡前夜读 · 第 12 期</div><div class="sub">三个让你慢下来的小故事 · 28 分钟</div></div>
              <div class="play"><div class="pbtn">▶</div><div class="pbar"><i></i></div><span class="ptime">10:42 / 28:05</span></div>
            </div>
          </div>
          <div class="vs-side">
            <div class="hd">图声片段</div>
            <div class="seg"><div class="th" style="background:linear-gradient(135deg,#3a2c5a,#6a4a9a)"></div><div><div class="t">开场 · 月亮</div><div class="d">00:00 – 02:10</div></div></div>
            <div class="seg"><div class="th" style="background:linear-gradient(135deg,#1a3a4a,#2a6a7a)"></div><div><div class="t">故事一 · 海边</div><div class="d">02:10 – 11:30</div></div></div>
            <div class="seg"><div class="th" style="background:linear-gradient(135deg,#4a3a1a,#8a6a2a)"></div><div><div class="t">故事二 · 旧城</div><div class="d">11:30 – 20:00</div></div></div>
            <div class="seg"><div class="th" style="background:linear-gradient(135deg,#2a2a4a,#4a4a7a)"></div><div><div class="t">故事三 · 星空</div><div class="d">20:00 – 28:05</div></div></div>
            <div class="add">+ 让 AI 再生成一段</div>
          </div>
        </div>
        <div class="timeline">
          <div class="clip img" style="background:linear-gradient(135deg,#3a2c5a,#6a4a9a)"><div class="wave"><i style="height:30%"></i><i style="height:60%"></i><i style="height:45%"></i><i style="height:80%"></i><i style="height:50%"></i><i style="height:70%"></i></div></div>
          <div class="clip img" style="background:linear-gradient(135deg,#1a3a4a,#2a6a7a)"><div class="wave"><i style="height:50%"></i><i style="height:40%"></i><i style="height:75%"></i><i style="height:55%"></i><i style="height:85%"></i><i style="height:45%"></i></div></div>
          <div class="clip img" style="background:linear-gradient(135deg,#4a3a1a,#8a6a2a)"><div class="wave"><i style="height:40%"></i><i style="height:70%"></i><i style="height:50%"></i><i style="height:65%"></i><i style="height:35%"></i><i style="height:60%"></i></div></div>
          <div class="clip img" style="background:linear-gradient(135deg,#2a2a4a,#4a4a7a)"><div class="wave"><i style="height:55%"></i><i style="height:45%"></i><i style="height:70%"></i><i style="height:40%"></i><i style="height:75%"></i><i style="height:50%"></i></div></div>
          <div class="tl-actions">
            <span class="pubtn dy">▶ 投稿抖音</span>
            <span class="pubtn bili">▶ 投稿 B 站</span>
          </div>
        </div>
      </div>
    </div>

    <div class="taskbar">
      <div class="launch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div class="tb-sep"></div>
      <div class="tb-win active"><span class="i">🎬</span>视频工坊</div>
      <div class="clock"><div class="t">23:18</div><div class="d">5/30</div></div>
    </div>
  </div>
  <script>function fit(){var s=document.querySelector('.screen');s.style.transform='scale('+Math.min(innerWidth/1600,innerHeight/900)+')';}addEventListener('resize',fit);fit();</script>
</body>
</html>
