<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>炒币机 · v4 列表+详情两页式</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0f;--panel:#14171f;--panel2:#191d27;--line:#1f2330;--line2:#171a23;
--text:#e9ebf2;--muted:#8a90a2;--faint:#565c6e;--gold:#f5b738;--bull:#2bd4a4;--bull-s:rgba(43,212,164,.13);
--bear:#ff5470;--bear-s:rgba(255,84,112,.13);--ai:#8b93ff;--ai-s:rgba(139,147,255,.12);--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(900px 500px at 50% -10%,rgba(139,147,255,.06),transparent 60%),var(--bg);
color:var(--text);font-family:Inter,system-ui,'PingFang SC',sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1}
.tag{position:fixed;top:14px;right:14px;font-family:var(--mono);font-size:11px;color:var(--ai);background:var(--ai-s);
border:1px solid rgba(139,147,255,.3);padding:5px 11px;border-radius:20px;z-index:9}
.wrap{max-width:640px;margin:0 auto;padding:20px 18px 50px}
/* header */
.hd{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.logo{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-weight:800;color:#1a1500;background:linear-gradient(135deg,#ffe7a3,var(--gold) 60%,#c8920a)}
.hd b{font-size:15px}.hd .eq{margin-left:auto;text-align:right}
.hd .eq .v{font-family:var(--mono);font-weight:600}.hd .eq .p{font-family:var(--mono);font-size:11px;color:var(--bull)}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:var(--panel);
border:1px solid var(--line);padding:7px 13px;border-radius:9px;cursor:pointer;margin-bottom:16px}
.back:hover{color:var(--text)}
/* list */
.tabbar{display:flex;gap:2px;padding:3px;background:#00000055;border:1px solid var(--line);border-radius:10px;margin-bottom:16px;width:fit-content}
.tabbar button{border:0;background:transparent;color:var(--faint);font-family:var(--mono);font-size:12px;font-weight:600;padding:6px 16px;border-radius:7px;cursor:pointer}
.tabbar button.on{background:rgba(245,183,56,.16);color:var(--gold)}
.li{display:flex;align-items:center;gap:13px;padding:15px 15px;border-radius:14px;background:var(--panel);border:1px solid var(--line);
margin-bottom:10px;cursor:pointer;transition:.14s;position:relative}
.li::before{content:'';position:absolute;left:0;top:13px;bottom:13px;width:3px;border-radius:3px}
.li.bull::before{background:var(--bull)}.li.bear::before{background:var(--bear)}.li.mute::before{background:var(--faint)}
.li:hover{border-color:#2c3142;transform:translateX(2px)}
.li .mid{min-width:0;flex:1;padding-left:6px}
.st{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.st.bull{background:var(--bull-s);color:var(--bull)}.st.bear{background:var(--bear-s);color:var(--bear)}.st.mute{background:#ffffff0d;color:var(--muted)}
.li .hl{font-size:14px;font-weight:600;margin-top:7px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li .meta{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:5px}
.li .rt{text-align:right;flex:none}
.li .pn{font-family:var(--mono);font-weight:700;font-size:13px}.up{color:var(--bull)}.down{color:var(--bear)}
.li .arrow{color:var(--faint);font-size:18px;flex:none}
/* detail */
.dt-hero{background:radial-gradient(360px 160px at 100% 0,var(--ai-s),transparent 70%),var(--panel);
border:1px solid rgba(139,147,255,.22);border-radius:18px;padding:22px;margin-bottom:14px}
.dt-hero .top{display:flex;align-items:center;gap:9px}
.dt-hero .when{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
.dt-hero h2{font-size:21px;font-weight:700;line-height:1.35;margin:14px 0}
.dt-hero .pn{font-family:var(--mono);font-size:15px;font-weight:700}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
.card .ct{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.chart svg{width:100%;height:150px;display:block}
.act-row{display:flex;align-items:center;gap:10px;padding:12px;border-radius:11px;background:var(--bull-s);border:1px solid rgba(43,212,164,.2);margin-bottom:8px}
.act-row.sell{background:var(--bear-s);border-color:rgba(255,84,112,.2)}
.act-row .lab{font-family:var(--mono);font-weight:700;color:var(--bull)}.act-row.sell .lab{color:var(--bear)}
.act-row .inst{font-family:var(--mono);font-weight:600}.act-row .x{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
.reason{font-size:14px;line-height:1.75;color:var(--muted)}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line2);font-family:var(--mono);font-size:12.5px}
.kv:last-child{border:0}.kv span:first-child{color:var(--faint)}
.hidden{display:none}
</style></head>
<body>
<div class="tag">v4 · 列表 + 详情</div>
<div class="wrap">

  <!-- 列表页 -->
  <div id="listPage">
    <div class="hd"><div class="logo">₿</div><b>炒币机</b>
      <div class="eq"><div class="v">$12,480.55</div><div class="p">▲ +12.41%</div></div></div>
    <div class="tabbar"><button class="on">AI 决策</button><button>成交订单</button><button>持仓</button></div>
    <div id="list"></div>
  </div>

  <!-- 详情页 -->
  <div id="detailPage" class="hidden">
    <button class="back" onclick="showList()">← 返回决策列表</button>
    <div id="detail"></div>
  </div>

</div>
<script>
const D=[
 {st:'bull',lab:'看多',ic:'▲',hl:'BTC 突破日线压力,加仓追势',time:'今天 10:42',id:1480,task:9042,pn:'+$58',pu:1,
  acts:[['买入','BTC-USDT','0.05','64,210',0]],
  reason:'1H 级别量价齐升,价格刚突破 64,000 前高且 RSI(14) 仍在 62 未到超买区,趋势延续概率高。按策略目标在 64,210 追加 0.05 BTC 多单,占用保证金约 7%,止损设在 62,800(前低下方),止盈分批挂在 66,500 / 68,000。',
  kv:[['市场立场','看多 bullish'],['采样周期','#1480'],['关联任务','task #9042'],['下单结果','已成交 · ordId 5521ّ'],['本笔盈亏','+$58 (+0.9%)']]},
 {st:'mute',lab:'观望',ic:'●',hl:'ETH 震荡,维持空单观望',time:'今天 10:37',id:1473,task:9037,pn:'−$41',pu:0,acts:[],
  reason:'ETH 在 3,120–3,180 区间反复震荡,4H 未给出明确方向。现有空单浮亏 $41 但在可控范围内,无加仓或平仓理由,本轮保持不动,继续观察 4H 是否收破 3,120 支撑。',
  kv:[['市场立场','观望 neutral'],['采样周期','#1473'],['关联任务','task #9037'],['本轮动作','无交易'],['持仓浮盈亏','−$41 (−0.5%)']]},
 {st:'bull',lab:'看多',ic:'▲',hl:'SOL 资金流入,小仓试多',time:'今天 10:32',id:1466,task:9032,pn:'+$23',pu:1,
  acts:[['买入','SOL-USDT','6','170.8',0]],
  reason:'链上稳定币净流入转正 + 永续资金费率由负转正,显示多头情绪回暖。以 6 张小仓在 170.8 试多验证趋势,占用保证金不超过 8%,若跌破 165 立即止损。',
  kv:[['市场立场','看多 bullish'],['采样周期','#1466'],['关联任务','task #9032'],['下单结果','已成交'],['本笔盈亏','+$23 (+0.4%)']]},
 {st:'bear',lab:'看空',ic:'▼',hl:'DOGE 拉升过急,获利了结',time:'今天 10:27',id:1459,task:9027,pn:'+$96',pu:1,
  acts:[['平仓','DOGE-USDT','','0.158',1]],
  reason:'DOGE 短时拉升 8%,价格大幅偏离 20 均线,RSI 进入超买,情绪过热回调风险升高。平掉昨日建立的多单锁定 +$96 利润,不恋战,等回踩均线再考虑入场。',
  kv:[['市场立场','看空 bearish'],['采样周期','#1459'],['关联任务','task #9027'],['下单结果','已平仓'],['本笔盈亏','+$96 (+5.1%)']]},
 {st:'mute',lab:'观望',ic:'●',hl:'全市场缩量,本轮空仓等待',time:'今天 10:22',id:1452,task:9022,pn:'',pu:0,acts:[],
  reason:'BTC 主导率走平、全市场成交量萎缩,缺乏明确入场理由。保留现金仓位,等待波动率回升或出现明确突破信号再决策。',
  kv:[['市场立场','观望 neutral'],['采样周期','#1452'],['关联任务','task #9022'],['本轮动作','无交易']]},
];
const list=document.getElementById('list');
list.innerHTML=D.map((d,i)=>`<div class="li ${d.st}" onclick="showDetail(${i})">
  <div class="mid"><span class="st ${d.st}">${d.ic} ${d.lab}</span>
   <div class="hl">${d.hl}</div>
   <div class="meta">#${d.id} · ${d.time}${d.acts.length?' · '+d.acts.length+' 笔动作':' · 未交易'}</div></div>
  <div class="rt">${d.pn?`<div class="pn ${d.pu?'up':'down'}">${d.pn}</div>`:'<div class="meta">—</div>'}</div>
  <div class="arrow">›</div></div>`).join('');

function showDetail(i){
  const d=D[i];
  const acts=d.acts.map(([lab,inst,sz,px,sell])=>`<div class="act-row ${sell?'sell':''}"><span class="lab">${lab}</span><span class="inst">${inst}</span>${sz?'<span class="x">数量 '+sz+'</span>':''}<span class="x">@ ${px}</span></div>`).join('')||'<div class="reason" style="font-family:var(--mono);font-size:13px">本轮未交易 · 持仓观望</div>';
  const mark=d.acts.length?'<circle cx="430" cy="52" r="5" fill="#8b93ff" stroke="#0a0b0f" stroke-width="2"/><text x="430" y="36" fill="#8b93ff" font-size="11" font-family="monospace" text-anchor="middle">AI 在此交易</text>':'';
  document.getElementById('detail').innerHTML=`
   <div class="dt-hero">
     <div class="top"><span class="st ${d.st}">${d.ic} ${d.lab}</span><span class="when">${d.time} · #${d.id}</span></div>
     <h2>${d.hl}</h2>
     ${d.pn?`<div class="pn ${d.pu?'up':'down'}">本笔盈亏 ${d.pn}</div>`:'<div class="when" style="margin:0">本轮无交易</div>'}
   </div>
   <div class="card"><div class="ct">净值曲线 · 标注本次交易点</div><div class="chart">
     <svg viewBox="0 0 480 150" preserveAspectRatio="none">
       <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2bd4a4" stop-opacity=".28"/><stop offset="1" stop-color="#2bd4a4" stop-opacity="0"/></linearGradient></defs>
       <path d="M0,120 L60,112 L120,116 L180,96 L240,102 L300,78 L360,82 L430,52 L480,40 L480,150 L0,150 Z" fill="url(#g)"/>
       <path d="M0,120 L60,112 L120,116 L180,96 L240,102 L300,78 L360,82 L430,52 L480,40" fill="none" stroke="#2bd4a4" stroke-width="2.4"/>
       ${mark}
     </svg></div></div>
   <div class="card"><div class="ct">本轮交易动作</div>${acts}</div>
   <div class="card"><div class="ct">AI 推理</div><p class="reason">${d.reason}</p></div>
   <div class="card"><div class="ct">明细</div>${d.kv.map(([k,v])=>`<div class="kv"><span>${k}</span><span>${v}</span></div>`).join('')}</div>`;
  document.getElementById('listPage').classList.add('hidden');
  document.getElementById('detailPage').classList.remove('hidden');
  window.scrollTo(0,0);
}
function showList(){
  document.getElementById('detailPage').classList.add('hidden');
  document.getElementById('listPage').classList.remove('hidden');
}
</script>
</body></html>
