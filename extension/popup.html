<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Agent Browser Connector</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
<div id="app">
  <div class="brand">
    <div class="logo">A</div>
    <div>
      <div class="brand-name">Agent</div>
      <div class="brand-sub">浏览器连接器</div>
    </div>
    <button id="btn-theme" class="theme-toggle" type="button" title="切换主题" aria-label="切换主题">
      <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </div>

  <!-- 已配置 -->
  <div id="view-status" hidden>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="state-text">…</span>
    </div>
    <div class="info" id="info"></div>
    <a class="link" href="#" target="_blank" id="site-link">打开 AGENT</a>
    <button id="btn-logout" class="btn-text">断开并清除配置</button>
  </div>

  <div id="view-auth" hidden>
    <div class="auth-note">
      <div class="auth-title">连接 AGENT</div>
      <div class="auth-copy">默认已指向本地 AGENT(ws://127.0.0.1:9500)。改了地址或连远端时,在这里填写。</div>
    </div>
    <form id="form-auth">
      <label>
        <span>接口地址 · BASE_URL</span>
        <input id="in-base" type="text" autocomplete="off" spellcheck="false" placeholder="http://127.0.0.1:9500" />
      </label>
      <label>
        <span>WebSocket · WS_URL</span>
        <input id="in-ws" type="text" autocomplete="off" spellcheck="false" placeholder="ws://127.0.0.1:9500" />
      </label>
      <label>
        <span>令牌 · TOKEN</span>
        <input id="in-token" type="password" autocomplete="off" spellcheck="false" placeholder="粘贴设备 TOKEN" />
      </label>
      <div id="error" class="error" hidden></div>
      <button id="btn-submit" class="btn" type="submit">连接</button>
    </form>
  </div>

  <div class="footer">v<span id="ver">0.0</span></div>
</div>
<script src="popup.js"></script>
</body>
</html>
