<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<title>应用遴选</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'PingFang SC', sans-serif;
  background: #0a0b0f;
  color: #e2e8f0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid #1a1f2e;
  flex-shrink: 0; background: #0d0f18;
}
header h1 { font-size: 12px; font-weight: 700; color: #3d4f6a; letter-spacing: 0.08em; text-transform: uppercase; }
.export-btn {
  background: #c8a870; color: #0a0b0f; border: none;
  padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
}
.export-btn:hover { opacity: 0.82; }

.main { flex: 1; display: flex; min-height: 0; }

/* 左侧边栏 */
.sidebar {
  width: 220px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: #0d0f18; border-right: 1px solid #1a1f2e;
}
.sidebar-header {
  padding: 14px 14px 8px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.sidebar-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #2d3f5a; }
.count-badge { background: #c8a870; color: #0a0b0f; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }

#sidebar-list {
  flex: 1; overflow-y: auto; padding: 4px 8px 16px;
  position: relative;
}
#sidebar-list.drag-over-active { background: rgba(200,168,112,0.04); }

.empty-hint {
  padding: 28px 14px; color: #1e2a3a;
  font-size: 12px; text-align: center; line-height: 1.8;
}

.sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 8px 8px 6px; border-radius: 7px;
  cursor: grab; color: #8a9ab8; font-size: 13px; font-weight: 500;
  transition: background 0.1s, color 0.1s;
  border: 1px solid transparent;
}
.sidebar-item:hover { background: #131a27; color: #c8d5e8; }
.sidebar-item.is-dragging { opacity: 0.25; }

.s-handle { color: #1e2a3a; font-size: 11px; letter-spacing: -1px; flex-shrink: 0; }
.sidebar-item:hover .s-handle { color: #2d3f5a; }
.s-icon { font-size: 15px; flex-shrink: 0; }
.s-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.s-remove {
  opacity: 0; background: none; border: none; color: #3d4f6a;
  font-size: 15px; cursor: pointer; flex-shrink: 0; padding: 0 2px;
  transition: opacity 0.1s, color 0.1s; line-height: 1;
}
.sidebar-item:hover .s-remove { opacity: 1; }
.s-remove:hover { color: #e74c3c; }

/* 排序插入线 */
.insert-line {
  height: 2px; background: #c8a870; border-radius: 1px;
  margin: 1px 4px; pointer-events: none;
  box-shadow: 0 0 8px #c8a87099;
}

/* 右侧面板 */
.panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.panel-header {
  padding: 14px 20px 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: #2d3f5a; flex-shrink: 0;
}
.panel-body { flex: 1; overflow-y: auto; padding: 0 20px 24px; }

.cat-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: #1e2a3a;
  margin: 20px 0 4px; padding-bottom: 6px;
  border-bottom: 1px solid #111822;
}
.cat-title:first-child { margin-top: 4px; }

.app-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px; border-radius: 7px; cursor: grab;
  border: 1px solid transparent;
  transition: background 0.1s, border-color 0.1s, opacity 0.15s;
}
.app-row:hover { background: #111520; border-color: #1a2030; }
.app-row.is-used { opacity: 0.2; pointer-events: none; }
.app-row.is-dragging { opacity: 0.2; }

.r-icon { font-size: 18px; flex-shrink: 0; width: 26px; text-align: center; }
.r-info { flex: 1; min-width: 0; }
.r-name { font-size: 13px; font-weight: 500; color: #8a9ab8; }
.r-desc { font-size: 11px; color: #263040; margin-top: 2px; line-height: 1.4; }
.app-row:hover .r-name { color: #c8d5e8; }
.app-row:hover .r-desc { color: #3d5070; }
.r-add {
  opacity: 0; width: 22px; height: 22px; border-radius: 50%;
  background: #c8a87022; border: 1px solid #c8a87044;
  color: #c8a870; font-size: 17px; line-height: 20px; text-align: center;
  cursor: pointer; flex-shrink: 0;
  transition: opacity 0.1s, background 0.1s;
}
.app-row:hover .r-add { opacity: 1; }
.r-add:hover { background: #c8a870; color: #0a0b0f; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1a2030; border-radius: 3px; }

/* 弹窗 */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #111520; border: 1px solid #1a2030;
  border-radius: 12px; padding: 24px;
  max-width: 460px; width: 90%; max-height: 65vh;
  display: flex; flex-direction: column; gap: 14px;
}
.modal h2 { font-size: 12px; font-weight: 700; color: #3d4f6a; letter-spacing: 0.08em; text-transform: uppercase; }
.modal pre {
  background: #0a0b0f; border-radius: 8px; padding: 14px;
  font-size: 12px; color: #6a7f9a; overflow-y: auto; flex: 1;
  line-height: 1.9; font-family: 'SF Mono','Menlo',monospace; white-space: pre-wrap;
}
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
.btn-copy { background: #c8a870; color: #0a0b0f; border: none; padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-close { background: #1a2030; color: #4a6080; border: none; padding: 7px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>应用遴选</h1>
  <button class="export-btn" onclick="showExport()">导出清单</button>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">已选应用</span>
      <span class="count-badge" id="sel-count">0</span>
    </div>
    <div id="sidebar-list"></div>
  </div>

  <div class="panel">
    <div class="panel-header">全部应用</div>
    <div class="panel-body" id="all-panel"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeExport()">
  <div class="modal">
    <h2>已选应用清单</h2>
    <pre id="export-text"></pre>
    <div class="modal-footer">
      <button class="btn-close" onclick="closeExport()">关闭</button>
      <button class="btn-copy" onclick="copyExport()">复制</button>
    </div>
  </div>
</div>

  { id:49, cat:'社交 & 竞技', icon:'📜', name:'矩阵报',          desc:'AI 自主经营的报纸，持续产出内容' },
  { id:50, cat:'社交 & 竞技', icon:'🃏', name:'poker',           desc:'多个 AI 打德州扑克竞赛' },
  { id:51, cat:'社交 & 竞技', icon:'📉', name:'虚拟货币进化',    desc:'多 AI 互相学习炒币策略并竞赛淘汰' },
  { id:52, cat:'社交 & 竞技', icon:'📆', name:'synapse',         desc:'年终总结助手，个人 + 团队双维度报告' },
  { id:53, cat:'社交 & 竞技', icon:'💡', name:'创新者',          desc:'全自动 agent 经营网站并尝试盈利' },
  { id:54, cat:'系统 & 扩展', icon:'💻', name:'远程 terminal',   desc:'通过 Telegram 机器人与系统交互' },
  { id:55, cat:'系统 & 扩展', icon:'🔌', name:'vita 插件',       desc:'浏览器插件，赋予系统操作浏览器的能力' },
  { id:56, cat:'系统 & 扩展', icon:'📍', name:'webmap',          desc:'在地图上标记位置并附加网页' },
];

// ── 状态 ──
let selectedList = []; // 有序 id 数组

// ── 拖拽状态 ──
let drag = {
  active: false,
  id: null,
  src: null,       // 'all' | 'sidebar'
  insertIdx: null, // 侧边栏排序插入位置
};

// ── 渲染侧边栏 ──
function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  document.getElementById('sel-count').textContent = selectedList.length;

  if (selectedList.length === 0) {
    list.innerHTML = '<div class="empty-hint">从右侧拖入<br>或点击 + 添加</div>';
    return;
  }

  // 插入线在顶部
  if (drag.active && drag.src === 'sidebar' && drag.insertIdx === 0) {
    list.appendChild(makeLine());
  }

  selectedList.forEach((id, idx) => {
    const app = APPS.find(a => a.id === id);
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (drag.active && drag.src === 'sidebar' && drag.id === id ? ' is-dragging' : '');
    item.dataset.id = id;
    item.draggable = true;
    item.innerHTML = `
      <span class="s-handle">⠿</span>
      <span class="s-icon">${app.icon}</span>
      <span class="s-name">${app.name}</span>
      <button class="s-remove">×</button>
    `;
    item.querySelector('.s-remove').addEventListener('mousedown', e => e.stopPropagation());
    item.querySelector('.s-remove').addEventListener('click', e => {
      e.stopPropagation();
      selectedList = selectedList.filter(x => x !== id);
      renderSidebar();
      renderAll();
    });
    item.addEventListener('dblclick', () => {
      selectedList = selectedList.filter(x => x !== id);
      renderSidebar(); renderAll();
    });

    // 侧边栏内拖拽排序
    item.addEventListener('dragstart', e => {
      drag = { active: true, id, src: 'sidebar', insertIdx: null };
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
      setTimeout(() => renderSidebar(), 0);
    });
    item.addEventListener('dragend', () => {
      drag = { active: false, id: null, src: null, insertIdx: null };
      renderSidebar(); renderAll();
    });

    list.appendChild(item);

    // 插入线在该项之后
    if (drag.active && drag.src === 'sidebar' && drag.insertIdx === idx + 1) {
      list.appendChild(makeLine());
    }
  });
}

function makeLine() {
  const l = document.createElement('div');
  l.className = 'insert-line';
  return l;
}

// ── 渲染右侧 ──
function renderAll() {
  const panel = document.getElementById('all-panel');
  panel.innerHTML = '';
  const cats = [...new Set(APPS.map(a => a.cat))];
  cats.forEach(cat => {
    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = cat;
    panel.appendChild(title);

    APPS.filter(a => a.cat === cat).forEach(app => {
      const isUsed = selectedList.includes(app.id);
      const row = document.createElement('div');
      row.className = 'app-row' + (isUsed ? ' is-used' : '') +
        (drag.active && drag.src === 'all' && drag.id === app.id ? ' is-dragging' : '');
      row.dataset.id = app.id;
      row.draggable = !isUsed;
      row.innerHTML = `
        <span class="r-icon">${app.icon}</span>
        <div class="r-info">
          <div class="r-name">${app.name}</div>
          <div class="r-desc">${app.desc}</div>
        </div>
        <button class="r-add" title="添加">+</button>
      `;

      if (!isUsed) {
        row.addEventListener('dragstart', e => {
          drag = { active: true, id: app.id, src: 'all', insertIdx: null };
          e.dataTransfer.effectAllowed = 'copy';
          e.dataTransfer.setData('text/plain', app.id);
          setTimeout(() => renderAll(), 0);
        });
        row.addEventListener('dragend', () => {
          drag = { active: false, id: null, src: null, insertIdx: null };
          renderSidebar(); renderAll();
        });
        row.addEventListener('dblclick', () => addApp(app.id));
        row.querySelector('.r-add').addEventListener('click', e => {
          e.stopPropagation(); addApp(app.id);
        });
      }
      panel.appendChild(row);
    });
  });
}

function addApp(id) {
  if (!selectedList.includes(id)) {
    selectedList.push(id);
    renderSidebar(); renderAll();
  }
}

// ── 侧边栏 dragover / drop（统一在 sidebar-list 容器上处理）──
document.getElementById('sidebar-list').addEventListener('dragover', e => {
  e.preventDefault();
  if (!drag.active) return;

  if (drag.src === 'all') {
    e.dataTransfer.dropEffect = 'copy';
    document.getElementById('sidebar-list').classList.add('drag-over-active');
    return;
  }

  if (drag.src === 'sidebar') {
    e.dataTransfer.dropEffect = 'move';
    // 计算插入位置
    const items = [...document.querySelectorAll('#sidebar-list .sidebar-item')];
    let insertIdx = selectedList.length;
    for (let i = 0; i < items.length; i++) {
      const rect = items[i].getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if (e.clientY < mid) { insertIdx = i; break; }
    }
    // 跳过自身相邻位置（无意义）
    const selfIdx = selectedList.indexOf(drag.id);
    if (insertIdx !== selfIdx && insertIdx !== selfIdx + 1) {
      if (drag.insertIdx !== insertIdx) {
        drag.insertIdx = insertIdx;
        renderSidebar();
      }
    }
  }
});

document.getElementById('sidebar-list').addEventListener('dragleave', e => {
  if (!document.getElementById('sidebar-list').contains(e.relatedTarget)) {
    document.getElementById('sidebar-list').classList.remove('drag-over-active');
    if (drag.src === 'sidebar') { drag.insertIdx = null; renderSidebar(); }
  }
});

document.getElementById('sidebar-list').addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('sidebar-list').classList.remove('drag-over-active');

  if (!drag.active) return;

  if (drag.src === 'all') {
    // 从右侧拖入：追加到末尾
    addApp(drag.id);
  } else if (drag.src === 'sidebar' && drag.insertIdx !== null) {
    // 侧边栏内排序
    const fromIdx = selectedList.indexOf(drag.id);
    if (fromIdx !== -1) {
      selectedList.splice(fromIdx, 1);
      let toIdx = drag.insertIdx;
      if (fromIdx < toIdx) toIdx--;
      selectedList.splice(toIdx, 0, drag.id);
    }
    drag = { active: false, id: null, src: null, insertIdx: null };
    renderSidebar(); renderAll();
  }
});

// ── 导出 ──
function showExport() {
  const lines = selectedList.map((id, i) => {
    const a = APPS.find(x => x.id === id);
    return `${i+1}. ${a.icon} ${a.name}\n   ${a.desc}`;
  });
  document.getElementById('export-text').textContent =
    lines.length ? lines.join('\n\n') : '还没有选择任何应用';
  document.getElementById('modal').classList.add('show');
}
function closeExport() { document.getElementById('modal').classList.remove('show'); }
function copyExport() {
  navigator.clipboard.writeText(document.getElementById('export-text').textContent).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

// 初始化
renderSidebar();
renderAll();
</script>
</body>
</html>
