<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>twitter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia','PingFang SC',serif;background:#f6f1e8;color:#4c4034;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px}
.profile{padding:8px 0 2px;text-align:center}
.avatar{width:86px;height:86px;border-radius:999px;object-fit:cover;border:1px solid #d9cebf;background:#faf2e8;display:block;margin:0 auto}
.avatar-empty{display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;color:#8a765f}
.name{margin-top:10px;font-size:28px;line-height:1.1;font-weight:700;color:#5a4a3a}
.signature{margin-top:8px;font-size:13px;color:#9f8d78;line-height:1.6}
.dm-row{display:flex;justify-content:center;margin:12px 0 18px}
.btn{border:1px solid #bca88f;background:#fff9f0;color:#6a5948;border-radius:999px;padding:9px 20px;font-size:13px;cursor:pointer;font-weight:600}
.btn:hover{background:#f4eadb}
.list{display:flex;flex-direction:column;gap:10px}
.card{background:#fffdf8;border:1px solid #e6dccf;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.content{white-space:pre-wrap;line-height:1.8;font-size:14px;color:#5a4c40}
.meta{margin-top:8px;font-size:11px;color:#a3927d}
.empty{margin-top:24px;text-align:center;font-size:13px;color:#b3a18c}
</style>
</head>
<body>
<div class="wrap">
  <div class="profile">
    <img id="avatar" class="avatar" alt="avatar" style="display:none;" />
    <div id="avatarEmpty" class="avatar avatar-empty">T</div>
    <div id="name" class="name">twitter</div>
    <div id="signature" class="signature"></div>
  </div>

  <div class="dm-row"><button class="btn" id="dmBtn">私信</button></div>

  <div id="list" class="list"></div>
  <div id="empty" class="empty" style="display:none;">暂无动态</div>
</div>
<script>
const listEl=document.getElementById('list');
const emptyEl=document.getElementById('empty');
const avatarEl=document.getElementById('avatar');
const avatarEmptyEl=document.getElementById('avatarEmpty');
const nameEl=document.getElementById('name');
const signatureEl=document.getElementById('signature');
document.getElementById('dmBtn').addEventListener('click',()=>{window.location.href='/apps/inbox/submit';});

const esc=(s)=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=(v)=>{if(!v)return '';const d=new Date(String(v).replace(' ','T'));if(Number.isNaN(d.getTime()))return v;return d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});};
const toPublic=(v)=>{const s=String(v||'').trim();if(!s)return'';if(s.startsWith('/files/'))return s;const i=s.indexOf('/files/');if(i>=0)return s.slice(i);return s;};

const loadProfile=async()=>{
  try{
    const res=await fetch('/apps/weibo/profile');
    const data=await res.json();
    const p=data?.profile||{};
    const n=String(p.displayName||'twitter');
    const sig=String(p.signature||'');
    const avatar=toPublic(p.avatarUrl||'');
    nameEl.textContent=n||'twitter';
    signatureEl.textContent=sig;
    if(avatar){
      avatarEl.src=avatar;
      avatarEl.style.display='block';
      avatarEmptyEl.style.display='none';
    }else{
      avatarEl.style.display='none';
      avatarEmptyEl.style.display='flex';
      avatarEmptyEl.textContent=(n||'twitter').slice(0,1).toUpperCase();
    }
  }catch{}
};

const loadPosts=async()=>{
  try{
    const res=await fetch('/apps/weibo/list?limit=100');
    const data=await res.json();
    const items=Array.isArray(data.data)?data.data:[];
    if(!items.length){emptyEl.style.display='block';return;}
    listEl.innerHTML=items.map((it)=>`<div class="card"><div class="content">${esc(it.content)}</div><div class="meta">${fmt(it.created_at)}</div></div>`).join('');
  }catch{
    emptyEl.style.display='block';
    emptyEl.textContent='加载失败，请稍后重试';
  }
};

loadProfile();
loadPosts();
</script>
</body>
</html>
