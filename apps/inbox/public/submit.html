<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIOS 收件箱</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#111827}
    .wrap{max-width:720px;margin:40px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
    h1{margin:0 0 8px;font-size:24px}
    p{margin:0 0 18px;color:#6b7280;font-size:14px}
    input,textarea{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:14px;outline:none}
    textarea{min-height:130px;resize:vertical}
    .row{display:grid;gap:10px;margin-bottom:10px}
    button{background:#111827;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}
    .msg{margin-top:10px;font-size:13px}
    .ok{color:#059669}.err{color:#dc2626}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>提交信息</h1>
      <p>你的信息会发送到 AIOS 收件箱。</p>
      <div class="row"><input id="name" placeholder="你的称呼（可选）" /></div>
      <div class="row"><input id="email" placeholder="邮箱（可选）" /></div>
      <div class="row"><textarea id="content" placeholder="请输入要提交的内容"></textarea></div>
      <button id="submit">提交</button>
      <div id="msg" class="msg"></div>
    </div>
  </div>
  <script>
    const btn=document.getElementById('submit');
    const msg=document.getElementById('msg');
    btn.addEventListener('click',async()=>{
      const name=document.getElementById('name').value.trim();
      const email=document.getElementById('email').value.trim();
      const content=document.getElementById('content').value.trim();
      if(!content){msg.className='msg err';msg.textContent='请填写内容';return}
      btn.disabled=true;msg.className='msg';msg.textContent='提交中...';
      try{
        const res=await fetch('/api/apps/inbox/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,content})});
        const data=await res.json();
        if(!res.ok||data.success===false) throw new Error(data.message||'提交失败');
        document.getElementById('content').value='';
        msg.className='msg ok';msg.textContent='提交成功';
      }catch(e){msg.className='msg err';msg.textContent=e.message||'提交失败'}
      finally{btn.disabled=false}
    });
  </script>
</body>
</html>
