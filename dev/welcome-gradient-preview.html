<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome Gradient Preview</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(ellipse 70% 60% at 15% 0%, rgba(255, 220, 160, 0.55) 0%, transparent 55%),
          radial-gradient(ellipse 60% 55% at 90% 95%, rgba(200, 210, 255, 0.5) 0%, transparent 55%),
          radial-gradient(ellipse 50% 45% at 75% 10%, rgba(220, 200, 255, 0.35) 0%, transparent 50%),
          #f7f3ee;
      }
    </style>
  </head>
  <body></body>
</html>
